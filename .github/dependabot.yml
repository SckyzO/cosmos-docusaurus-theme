version: 2

updates:
  # Root package dependencies (stylelint, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"

  # Demo site dependencies
  - package-ecosystem: "npm"
    directory: "/demo"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
      - "demo"
    groups:
      # Docusaurus refuses to build when official @docusaurus/* packages resolve
      # to different versions, so they must be bumped in a single PR. Ungrouped,
      # Dependabot opens one PR per package and each is broken on its own.
      # Excludes third-party plugins like @easyops-cn/*, which version freely.
      docusaurus:
        patterns:
          - "@docusaurus/*"

  # Render smoke test dependencies (Playwright)
  - package-ecosystem: "npm"
    directory: "/tests/render"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
      - "tests"

  # GitHub Actions versions (covers all workflow files)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
