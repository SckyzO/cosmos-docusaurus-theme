name: Publish to npm & GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to publish (e.g. v1.2.1)"
        required: true
        default: "v1.2.1"
      skip_npm:
        description: "Skip npm publish"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_docker:
        description: "Skip Docker build+push"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  packages: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_npm != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Node.js with npm registry
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CSS linter before publish
        run: npm run lint:css

      - name: Publish package to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-docker:
    name: Build & push Docker image to GHCR
    runs-on: ubuntu-latest
    needs: publish-npm
    if: ${{ always() && !failure() && github.event.inputs.skip_docker != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          REF="${{ github.event.inputs.ref || github.ref }}"
          TAG="${REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Publishing image for tag: $TAG"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sckyzo/cosmos-docusaurus-theme:latest
            ghcr.io/sckyzo/cosmos-docusaurus-theme:${{ steps.meta.outputs.tag }}
