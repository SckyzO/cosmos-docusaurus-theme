name: Publish & Deploy Demo

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to publish (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
      skip_npm:
        description: "Skip npm publish (deploy demo only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_npm != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Node.js with npm registry
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CSS linter before publish
        run: npm run lint:css

      - name: Publish package to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-demo:
    name: Deploy demo to GitHub Pages
    runs-on: ubuntu-latest
    needs: publish-npm
    if: ${{ always() && !failure() }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install demo dependencies
        working-directory: demo
        run: npm install

      - name: Build demo site
        working-directory: demo
        run: npm run build
        env:
          DOCS_BASE_URL: /cosmos-docusaurus-theme/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: demo/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
