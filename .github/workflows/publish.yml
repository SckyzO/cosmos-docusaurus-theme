name: Publish to npm & GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to publish (e.g. v2.1.0)"
        required: true
        # No default — forces explicit input to avoid accidental republish
      skip_npm:
        description: "Skip npm publish"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_docker:
        description: "Skip Docker build+push"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  packages: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    # OIDC trusted publishing — no long-lived npm token (npm bypass-2FA tokens
    # are being deprecated). Requires a trusted publisher configured for this
    # package on npmjs.com (GitHub Actions -> SckyzO/cosmos-docusaurus-theme,
    # workflow publish.yml). Job-scoped permissions override the top-level block.
    permissions:
      id-token: write # mint the OIDC token npm exchanges for publish auth
      contents: read
    if: ${{ github.event.inputs.skip_npm != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Node.js with npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Node 24 + latest npm — OIDC trusted publishing needs npm >= 11.5.1.
          # No dependency cache in release builds (npm guidance).
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports OIDC trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run full lint suite before publish
        run: npm run lint

      - name: Publish package to npm (OIDC trusted publishing)
        # No NODE_AUTH_TOKEN — npm authenticates via the GitHub OIDC token.
        run: npm publish --access public

  build-docker:
    name: Build & push Docker image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: publish-npm
    if: ${{ always() && !failure() && github.event.inputs.skip_docker != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Extract version tag
        id: meta
        run: |
          REF="${{ github.event.inputs.ref || github.ref }}"
          TAG="${REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Docker image for scanning
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          provenance: false
          sbom: false
          tags: cosmos-docusaurus-theme:scan

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: "cosmos-docusaurus-theme:scan"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/sckyzo/cosmos-docusaurus-theme:latest
            ghcr.io/sckyzo/cosmos-docusaurus-theme:${{ steps.meta.outputs.tag }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, build-docker]
    if: ${{ always() && !failure() && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          echo "$NOTES" > /tmp/release-notes.md
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.changelog.outputs.tag }}"
          if gh release view "$TAG" --repo ${{ github.repository }} > /dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo ${{ github.repository }} \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" \
              --repo ${{ github.repository }} \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              --latest
          fi
