name: Publish to npm & GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to publish (e.g. v2.1.0)"
        required: true
        # No default — forces explicit input to avoid accidental republish
      skip_npm:
        description: "Skip npm publish"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_docker:
        description: "Skip Docker build+push"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  packages: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_npm != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Node.js with npm registry
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20.19"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run full lint suite before publish
        run: npm run lint

      - name: Publish package to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-docker:
    name: Build & push Docker image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: publish-npm
    if: ${{ always() && !failure() && github.event.inputs.skip_docker != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract version tag
        id: meta
        run: |
          REF="${{ github.event.inputs.ref || github.ref }}"
          TAG="${REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Docker image for scanning
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: false
          load: true
          provenance: false
          sbom: false
          tags: cosmos-docusaurus-theme:scan

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: "cosmos-docusaurus-theme:scan"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
          trivyignore: .trivyignore

      - name: Push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/sckyzo/cosmos-docusaurus-theme:latest
            ghcr.io/sckyzo/cosmos-docusaurus-theme:${{ steps.meta.outputs.tag }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, build-docker]
    if: ${{ always() && !failure() && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          echo "$NOTES" > /tmp/release-notes.md
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.changelog.outputs.tag }}"
          if gh release view "$TAG" --repo ${{ github.repository }} > /dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo ${{ github.repository }} \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" \
              --repo ${{ github.repository }} \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              --latest
          fi
