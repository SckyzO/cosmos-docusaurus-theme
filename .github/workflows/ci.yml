name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CSS linter (stylelint)
        run: npm run lint:css

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # This package is CSS-only with no runtime dependencies.
      # Audit dev tools at high severity — peer deps are excluded from the report.
      - name: Run npm audit (high and above)
        run: npm audit --audit-level=high

      # Verify the package ships no runtime dependencies (CSS-only invariant)
      - name: Verify no runtime dependencies
        run: |
          node -e "
            const pkg = require('./package.json');
            const deps = pkg.dependencies || {};
            const count = Object.keys(deps).length;
            if (count > 0) {
              console.error('ERROR: Package must not ship runtime dependencies. Found:', deps);
              process.exit(1);
            }
            console.log('OK: No runtime dependencies.');
          "

  demo-build:
    name: Build demo site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install demo dependencies
        working-directory: demo
        run: npm install

      - name: Build demo site
        working-directory: demo
        run: npm run build
