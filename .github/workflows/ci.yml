name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (CSS + JS + Markdown + Format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CSS linter (stylelint)
        run: npm run lint:css

      - name: Run JS linter (ESLint)
        run: npm run lint:js

      - name: Run Markdown linter (markdownlint)
        run: npm run lint:md

      - name: Check formatting (Prettier)
        run: npm run lint:format

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # CSS-only package — no runtime deps. Audit dev tools at high severity.
      - name: Run npm audit (high and above)
        run: npm audit --audit-level=high

      # Invariant check: package must never ship runtime dependencies
      - name: Verify no runtime dependencies
        run: |
          node -e "
            const pkg = require('./package.json');
            const deps = pkg.dependencies || {};
            if (Object.keys(deps).length > 0) {
              console.error('ERROR: Package must not ship runtime dependencies:', deps);
              process.exit(1);
            }
            console.log('OK: No runtime dependencies.');
          "

  demo-build:
    name: Build demo site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci --legacy-peer-deps

      - name: Build demo site
        working-directory: demo
        run: npm run build

  render-smoke:
    name: Render smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci --legacy-peer-deps

      # docusaurus serve only serves demo/build — it does not create it.
      - name: Build demo site
        working-directory: demo
        run: npm run build

      - name: Install smoke test dependencies
        working-directory: tests/render
        run: npm ci

      - name: Install Chromium
        working-directory: tests/render
        run: npx playwright install --with-deps chromium

      # Loads the built demo in a real browser and asserts computed styles.
      # Guards against cascade regressions that leave every other gate green.
      - name: Run render smoke test
        working-directory: tests/render
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: tests/render/playwright-report/
          retention-days: 7

  docker-build:
    name: Verify Dockerfile builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Build the demo Docker image without pushing — validates the Dockerfile
      - name: Build Docker image (no push)
        run: docker build -t cosmos-docusaurus-theme:ci-check .
