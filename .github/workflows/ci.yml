name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (CSS + JS + Markdown + Format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20.19"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CSS linter (stylelint)
        run: npm run lint:css

      - name: Run JS linter (ESLint)
        run: npm run lint:js

      - name: Run Markdown linter (markdownlint)
        run: npm run lint:md

      - name: Check formatting (Prettier)
        run: npm run lint:format

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20.19"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # CSS-only package — no runtime deps. Audit dev tools at high severity.
      - name: Run npm audit (high and above)
        run: npm audit --audit-level=high

      # Invariant check: package must never ship runtime dependencies
      - name: Verify no runtime dependencies
        run: |
          node -e "
            const pkg = require('./package.json');
            const deps = pkg.dependencies || {};
            if (Object.keys(deps).length > 0) {
              console.error('ERROR: Package must not ship runtime dependencies:', deps);
              process.exit(1);
            }
            console.log('OK: No runtime dependencies.');
          "

  demo-build:
    name: Build demo site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20.19"

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci --legacy-peer-deps

      - name: Build demo site
        working-directory: demo
        run: npm run build

  docker-build:
    name: Verify Dockerfile builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Build the demo Docker image without pushing — validates the Dockerfile
      - name: Build Docker image (no push)
        run: docker build -t cosmos-docusaurus-theme:ci-check .
