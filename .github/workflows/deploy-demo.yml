name: Deploy Demo

on:
  # Auto-deploy whenever main is updated — demo always reflects latest code
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy-demo:
    name: Build & deploy demo to GitHub Pages
    runs-on: ubuntu-latest
    # Always deploy from main so GitHub Pages environment rules are satisfied
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci --legacy-peer-deps

      - name: Build demo site
        working-directory: demo
        run: npm run build
        env:
          DOCS_BASE_URL: /cosmos-docusaurus-theme/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: demo/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
