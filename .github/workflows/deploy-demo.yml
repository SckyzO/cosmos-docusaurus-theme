name: Deploy Demo

on:
  # Auto-deploy whenever main is updated — demo always reflects latest code
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy-demo:
    name: Build & deploy demo to GitHub Pages
    runs-on: ubuntu-latest
    # Always deploy from main so GitHub Pages environment rules are satisfied
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20.19"

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci --legacy-peer-deps

      - name: Build demo site
        working-directory: demo
        run: npm run build
        env:
          DOCS_BASE_URL: /cosmos-docusaurus-theme/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: demo/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
